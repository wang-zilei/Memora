<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Memora</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 16px; min-width: 320px; }
    .header { text-align: center; margin-bottom: 16px; }
    .header h1 { font-size: 16px; color: #333; }
    .header .subtitle { font-size: 12px; color: #999; margin-top: 4px; }
    .status { padding: 10px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; }
    .status.ok { background: #e8f5e9; color: #2e7d32; }
    .status.error { background: #ffebee; color: #c62828; }
    .status.loading { background: #fff3e0; color: #e65100; }
    .info { font-size: 12px; color: #666; line-height: 1.6; }
    .info code { background: #f5f5f5; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
    .btn { display: block; width: 100%; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; margin-top: 8px; }
    .btn-primary { background: #667eea; color: white; }
    .btn-primary:hover { background: #5a6fd6; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Memora</h1>
    <div class="subtitle">让知识在对话里生长</div>
  </div>

  <div id="status" class="status loading">检查 Memora 客户端连接中...</div>

  <div class="info">
    <p>📌 <b>使用方法：</b></p>
    <p>1. 先启动 Memora 客户端并完成 API 设置</p>
    <p>2. 在支持的 LLM 对话页面点击右侧悬浮球</p>
    <p>3. 等待抓取和 AI 总结完成</p>
    <p>4. 回到 Memora 客户端查看卡片</p>
  </div>

  <button class="btn btn-primary" id="checkStatus" style="margin-top: 8px;">重新检查连接</button>

  <script src="popup.js"></script>
</body>
</html>
