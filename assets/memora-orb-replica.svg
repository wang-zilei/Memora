<svg xmlns="http://www.w3.org/2000/svg" width="235" height="253" viewBox="0 0 235 253">
  <defs>
    <radialGradient id="floorGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7254ff" stop-opacity=".34"/>
      <stop offset="42%" stop-color="#8c6dff" stop-opacity=".16"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="sphereFill" cx="38%" cy="23%" r="82%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".96"/>
      <stop offset="13%" stop-color="#f8f6ff" stop-opacity=".82"/>
      <stop offset="32%" stop-color="#ddd9ff" stop-opacity=".6"/>
      <stop offset="55%" stop-color="#9faaff" stop-opacity=".34"/>
      <stop offset="73%" stop-color="#8eeaff" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#7656ff" stop-opacity=".5"/>
    </radialGradient>

    <radialGradient id="innerViolet" cx="56%" cy="54%" r="62%">
      <stop offset="0%" stop-color="#fff7ff" stop-opacity=".26"/>
      <stop offset="42%" stop-color="#8863ff" stop-opacity=".28"/>
      <stop offset="72%" stop-color="#6e53ff" stop-opacity=".24"/>
      <stop offset="100%" stop-color="#6bdcff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="leftGlare" cx="24%" cy="25%" r="45%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".95"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity=".34"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="rightGlare" cx="80%" cy="33%" r="31%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".72"/>
      <stop offset="36%" stop-color="#ffffff" stop-opacity=".24"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="sphereStroke" x1="41" y1="31" x2="191" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b9a5ff"/>
      <stop offset="33%" stop-color="#8a75ff"/>
      <stop offset="67%" stop-color="#75dfff"/>
      <stop offset="100%" stop-color="#8f73ff"/>
