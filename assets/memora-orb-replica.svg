  <ellipse cx="119" cy="228" rx="76" ry="18" fill="url(#floorGlow)" filter="url(#softBlur)"/>
  <ellipse cx="120" cy="219" rx="58" ry="11" fill="#754cff" opacity=".1" filter="url(#softBlur)"/>

  <g filter="url(#orbShadow)">
    <circle cx="120" cy="118" r="103" fill="url(#sphereFill)" stroke="url(#sphereStroke)" stroke-width="1.35"/>
    <circle cx="120" cy="118" r="98" fill="none" stroke="#ffffff" stroke-opacity=".55" stroke-width="2.1"/>
    <circle cx="120" cy="118" r="90" fill="url(#innerViolet)" stroke="#ffffff" stroke-opacity=".15"/>

    <path d="M31 78c16-35 50-55 90-56" fill="none" stroke="#ffffff" stroke-width="8.5" stroke-linecap="round" opacity=".44"/>
    <path d="M35 62c19-26 51-41 86-39" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" opacity=".8"/>
    <ellipse cx="73" cy="61" rx="31" ry="65" transform="rotate(35 73 61)" fill="url(#leftGlare)" opacity=".7"/>
    <ellipse cx="189" cy="74" rx="25" ry="44" transform="rotate(-25 189 74)" fill="url(#rightGlare)" opacity=".34"/>
    <ellipse cx="197" cy="104" rx="11" ry="23" transform="rotate(-15 197 104)" fill="#ffffff" opacity=".08"/>

    <g transform="translate(29.28 25.6) scale(.112)" filter="url(#logoInsideShadow)">
      <path d="M369 320 C369 224 467 171 553 213 L939 399 C978 418 1002 457 1002 501 L1002 1085 C1002 1140 967 1189 915 1207 L526 1337 C446 1364 369 1305 369 1220 Z" fill="url(#logoLeftFoldFill)" stroke="url(#logoLeftStroke)" stroke-width="5.5" stroke-linejoin="round" filter="url(#logoSoftEdge)"/>
      <path d="M883 367 L1090 287 C1171 256 1254 316 1254 404 L1254 1271 C1254 1358 1168 1418 1086 1388 L724 1261 C674 1244 641 1197 641 1144 L641 531 C641 487 668 449 708 433 Z" fill="url(#logoRightFoldFill)" stroke="url(#logoRightStroke)" stroke-width="5.5" stroke-linejoin="round" filter="url(#logoSoftEdge)"/>
      <path d="M708 433 L883 367 L935 392 C976 412 1002 454 1002 499 L1002 1082 C1002 1136 968 1184 917 1202 L724 1261 C674 1244 641 1197 641 1144 L641 531 C641 487 668 449 708 433 Z" fill="url(#logoCenterFill)" stroke="url(#logoCenterStroke)" stroke-width="5.5" stroke-linejoin="round" filter="url(#logoSoftEdge)"/>
      <path d="M708 433 L883 367 L935 392 C976 412 1002 454 1002 499 L1002 1082 C1002 1136 968 1184 917 1202 L724 1261 C674 1244 641 1197 641 1144 L641 531 C641 487 668 449 708 433 Z" fill="url(#logoCenterBloom)" opacity=".9"/>
      <path d="M641 531 C641 487 668 449 708 433 L883 367" fill="none" stroke="#74aef0" stroke-width="6" stroke-linecap="round" opacity=".38"/>
      <path d="M369 320 C369 224 467 171 553 213 L883 367 L1090 287 C1171 256 1254 316 1254 404" fill="none" stroke="#8f8dde" stroke-width="4" stroke-linecap="round" opacity=".26"/>
    </g>

    <circle cx="122" cy="126" r="8.8" fill="#fffef8" filter="url(#whiteDotShadow)"/>
    <circle cx="122" cy="126" r="14" fill="#ffffff" opacity=".13"/>

    <circle cx="102" cy="42" r="1.1" fill="#ffffff" opacity=".72"/>
    <circle cx="145" cy="48" r="1.4" fill="#ffffff" opacity=".54"/>
    <circle cx="169" cy="81" r="1.2" fill="#ffffff" opacity=".48"/>
    <circle cx="188" cy="123" r="1.3" fill="#ffffff" opacity=".58"/>
    <circle cx="76" cy="151" r="1" fill="#ffffff" opacity=".44"/>
  </g>
</svg>
