    <linearGradient id="logoLeftFoldFill" x1="376" y1="257" x2="1005" y2="1278" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".76"/>
      <stop offset="42%" stop-color="#dce8ff" stop-opacity=".58"/>
      <stop offset="100%" stop-color="#c6f4ff" stop-opacity=".42"/>
    </linearGradient>

    <linearGradient id="logoRightFoldFill" x1="875" y1="283" x2="1174" y2="1389" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".72"/>
      <stop offset="48%" stop-color="#e6ddff" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#bf76ff" stop-opacity=".56"/>
    </linearGradient>

    <linearGradient id="logoCenterFill" x1="606" y1="535" x2="974" y2="1128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#77c8ff" stop-opacity=".9"/>
      <stop offset="44%" stop-color="#405df6" stop-opacity=".92"/>
      <stop offset="100%" stop-color="#ae56fa" stop-opacity=".88"/>
    </linearGradient>

    <radialGradient id="logoCenterBloom" cx="34%" cy="39%" r="72%">
      <stop offset="0%" stop-color="#8bddff" stop-opacity=".82"/>
      <stop offset="40%" stop-color="#4c75ff" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#933cff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="logoLeftStroke" x1="370" y1="255" x2="986" y2="1298" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#718ee0" stop-opacity=".78"/>
      <stop offset="54%" stop-color="#6899e7" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#8d80dc" stop-opacity=".66"/>
