    </filter>

    <filter id="orbShadow" x="-35%" y="-30%" width="170%" height="175%">
      <feDropShadow dx="0" dy="16" stdDeviation="15" flood-color="#7357ff" flood-opacity=".18"/>
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#55d2ff" flood-opacity=".17"/>
    </filter>

    <filter id="logoInsideShadow" x="-18%" y="-16%" width="136%" height="132%">
      <feDropShadow dx="-6" dy="12" stdDeviation="18" flood-color="#6781d8" flood-opacity=".13"/>
      <feDropShadow dx="10" dy="16" stdDeviation="28" flood-color="#a45be6" flood-opacity=".12"/>
    </filter>

    <filter id="logoSoftEdge" x="-6%" y="-6%" width="112%" height="112%">
      <feGaussianBlur stdDeviation=".35"/>
    </filter>

    <filter id="whiteDotShadow" x="-90%" y="-90%" width="280%" height="280%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#d9d0bd" flood-opacity=".44"/>
    </filter>
