      <stop offset="46%" stop-color="#8998e2" stop-opacity=".46"/>
      <stop offset="100%" stop-color="#9d55d9" stop-opacity=".78"/>
    </linearGradient>

    <linearGradient id="logoCenterStroke" x1="609" y1="459" x2="984" y2="1235" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5f9ce6" stop-opacity=".72"/>
      <stop offset="42%" stop-color="#5270ea" stop-opacity=".42"/>
      <stop offset="100%" stop-color="#7d62dd" stop-opacity=".68"/>
    </linearGradient>

    <filter id="softBlur" x="-25%" y="-25%" width="150%" height="150%">
